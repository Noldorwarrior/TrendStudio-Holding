/* S26: Theme — Design System v1.2.0
   Owner: S26 | Phase 1
   Dark cinematic palette + 16:9 layout tokens */

/* === CSS Custom Properties === */
:root {
  /* Background */
  --bg-primary:     #0A0E1A;
  --bg-secondary:   #141A2A;
  --bg-tertiary:    #1E2640;
  --bg-glass:       rgba(20,26,42,0.65);

  /* Gold accent */
  --gold:           #C9A961;
  --gold-light:     #E5C98A;
  --gold-dark:      #8B7538;
  --gold-glow:      rgba(201,169,97,0.45);

  /* Text */
  --text-primary:   #F5F5F5;
  --text-secondary: #9CA3AF;
  --text-muted:     #8B93A6;  /* WCAG 2AA: 5.3:1 on #141A2A (was #6B7280, 3.58:1) */

  /* Semantic */
  --success: #10B981;
  --warning: #F59E0B;
  --danger:  #EF4444;
  --info:    #60A5FA;

  /* Chart palette */
  --chart-1: #3B82F6;
  --chart-2: #8B5CF6;
  --chart-3: #10B981;
  --chart-4: #F59E0B;
  --chart-5: #EF4444;
  --chart-6: #EC4899;
  --chart-7: #06B6D4;
  --chart-8: #84CC16;

  /* Gradients */
  --grad-cinema: linear-gradient(135deg, #0A0E1A 0%, #141A2A 50%, #1E2640 100%);
  --grad-gold:   linear-gradient(135deg, #8B7538 0%, #C9A961 50%, #E5C98A 100%);
  --grad-risk:   linear-gradient(90deg, #10B981 0%, #F59E0B 50%, #EF4444 100%);

  /* Shadows */
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.30);
  --shadow-md:   0 8px 24px rgba(0,0,0,0.45);
  --shadow-lg:   0 20px 60px rgba(0,0,0,0.60);
  --shadow-gold: 0 0 40px rgba(201,169,97,0.35);

  /* Borders */
  --border-subtle: 1px solid rgba(255,255,255,0.06);
  --border-gold:   1px solid rgba(201,169,97,0.25);

  /* Radius */
  --r-sm: 6px;  --r-md: 12px;  --r-lg: 20px;  --r-xl: 32px;

  /* Easing */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out-q: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Timing */
  --t-fast: 160ms;  --t-base: 320ms;  --t-slow: 720ms;  --t-epic: 1600ms;

  /* Typography */
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-display: 'Georgia', serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', monospace;

  /* Layout (16:9) */
  --slide-w: 1920px;
  --slide-h: 1080px;
  --slide-pad: 80px;
  --slide-pad-x: 120px;
}

/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Accessibility === */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.sr-only-focusable:focus {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10000;
  width: auto;
  height: auto;
  padding: 12px 24px;
  margin: 0;
  overflow: visible;
  clip: auto;
  white-space: normal;
  background: var(--gold);
  color: var(--bg-primary);
  font-weight: 600;
  text-decoration: none;
}

/* === Navigation === */
#deck-nav {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 24px;
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  border: var(--border-subtle);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-md);
  transition: opacity var(--t-base) var(--ease-out-expo);
}

#deck-nav button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: var(--r-sm);
  transition: color var(--t-fast), background var(--t-fast);
}

#deck-nav button:hover:not(:disabled) {
  color: var(--gold);
  background: rgba(201,169,97,0.1);
}

#deck-nav button:disabled {
  opacity: 0.3;
  cursor: default;
}

#deck-nav button:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

#nav-indicator {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 14px;
  min-width: 60px;
  text-align: center;
}

/* === Slide Container === */
.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--grad-cinema);
  overflow: hidden;
}

.slide[hidden] {
  display: none;
}

.slide-inner {
  width: 100%;
  max-width: var(--slide-w);
  height: 100%;
  margin: 0 auto;
  padding: var(--slide-pad) var(--slide-pad-x);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* === Typography === */
.slide-title {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.slide-subtitle {
  font-size: 20px;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 32px;
}

.slide-body {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* === Cards === */
.metric-card {
  background: var(--bg-secondary);
  border: var(--border-subtle);
  border-radius: var(--r-md);
  padding: 24px;
  transition: transform var(--t-fast) var(--ease-out-expo), box-shadow var(--t-fast);
}

.metric-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.metric-card__value {
  font-family: var(--font-mono);
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.1;
}

.metric-card__label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* === Chart wrapper === */
.chart-wrapper {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
}

.chart-wrapper figure {
  width: 100%;
  height: 100%;
  margin: 0;
}

.chart-wrapper canvas {
  width: 100% !important;
  height: 100% !important;
}

/* === Grid layouts === */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 24px; }

/* === Tables === */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.data-table th {
  text-align: left;
  padding: 10px 16px;
  color: var(--gold);
  font-weight: 600;
  border-bottom: 2px solid rgba(201,169,97,0.3);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.data-table td {
  padding: 10px 16px;
  border-bottom: var(--border-subtle);
  color: var(--text-secondary);
}

.data-table tr:hover td {
  background: rgba(255,255,255,0.02);
}

.data-table .num {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text-primary);
}

/* === Badges === */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 6px 16px;
  border-radius: var(--r-xl);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.badge--gold {
  background: rgba(201,169,97,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,169,97,0.3);
}

.badge--critical { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge--high     { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.badge--medium   { background: rgba(59,130,246,0.15); color: var(--info); border: 1px solid rgba(59,130,246,0.3); }
.badge--low      { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

/* === Disclosure/Notes === */
.disclosure {
  font-size: 12px;
  color: var(--text-muted);
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border-left: 3px solid var(--gold-dark);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-top: auto;
}

/* === Formula box === */
.formula-box {
  font-family: var(--font-mono);
  font-size: 15px;
  color: var(--gold-light);
  background: var(--bg-tertiary);
  padding: 16px 24px;
  border-radius: var(--r-md);
  border: var(--border-gold);
  text-align: center;
}

/* === Progress/bar indicators === */
.bar-h {
  height: 8px;
  border-radius: 4px;
  background: var(--bg-tertiary);
  overflow: hidden;
}

.bar-h__fill {
  height: 100%;
  border-radius: 4px;
  transition: width var(--t-slow) var(--ease-out-expo);
}

/* === Tooltip === */
.tooltip-portal {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  padding: 8px 14px;
  background: var(--bg-secondary);
  border: var(--border-gold);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-md);
  font-size: 13px;
  color: var(--text-primary);
  max-width: 280px;
  opacity: 0;
  transition: opacity var(--t-fast);
}

.tooltip-portal.visible {
  opacity: 1;
}

/* === Reduced motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* === Focus visible === */
:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* === Print (minimal) === */
@media print {
  #deck-nav, #skip-link, #a11y-live { display: none; }
  .slide { page-break-after: always; position: relative; height: auto; }
  .slide[hidden] { display: block; }
}


  /* === Phase 2C CSS === */
  /* --- cinematic.css --- */
/* ========================================================================
   Phase 2C Cinematic — global CSS variables, keyframes, z-index layers
   See: Handoff_Phase2C/00_infra/INFRA_PROMPT.md §7
   ======================================================================== */

:root {
  /* Z-index layers (Phase 2C reserves 100-999) */
  --z-ambient: 100;           /* G8 canvas behind content */
  --z-parallax: 110;          /* G12 depth layers */
  --z-slide-content: 200;     /* base content */
  --z-whatif-handle: 300;     /* G16 editable field markers */
  --z-contextmenu: 500;       /* G14 menu */
  --z-modal: 600;             /* Phase 2B modal (existing) */
  --z-cinema-letterbox: 800;  /* G10 letterbox bars */
  --z-cinema-grain: 810;      /* G10 grain overlay */

  /* Animation timings */
  --t-slide-enter: 3500ms;
  --t-slide-exit: 700ms;
  --t-crossfade: 600ms;
  --t-micro: 200ms;

  /* Easing */
  --ease-enter: cubic-bezier(0.22, 0.61, 0.36, 1.0);
  --ease-exit: cubic-bezier(0.42, 0.0, 0.58, 1.0);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1.0);

  /* Ambient colors (base palette — must match TS.Charts.palette) */
  --c-ambient-dust: rgba(255, 235, 180, 0.15);
  --c-ambient-sparkle: rgba(255, 200, 100, 0.4);
  --c-lightleak-warm: #FFCC66;
  --c-lightleak-cold: #66CCFF;
  --c-bg-cinema: #0A1628;

  /* Grain */
  --grain-density: 0.15;
  --grain-fps: 8;
}

/* ========================================================================
   Keyframes shared across modules
   ======================================================================== */

@keyframes ts-fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes ts-fade-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}

@keyframes ts-slide-up {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

@keyframes ts-pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 currentColor; }
  50%      { box-shadow: 0 0 16px 4px currentColor; }
}

@keyframes ts-grain-flicker {
  0%, 100% { opacity: var(--grain-density); }
  50%      { opacity: calc(var(--grain-density) * 1.3); }
}

/* ========================================================================
   Reduced-motion overrides (CRITICAL a11y)
   ======================================================================== */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  /* Ambient/Parallax must stop — handled by JS (TS.Ambient.pause, TS.Parallax.disable) */
}

/* ========================================================================
   Base classes (individual modules extend these)
   ======================================================================== */

.ts-ambient-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: var(--z-ambient);
}

.ts-parallax-layer {
  will-change: transform;
  transition: transform 0.4s var(--ease-enter);
}

.ts-cinema-active .ts-slide {
  filter: contrast(1.05) saturate(1.1);
}

.ts-whatif-editable {
  position: relative;
  cursor: pointer;
  border-bottom: 1px dashed currentColor;
  transition: background var(--t-micro);
}

.ts-whatif-editable:hover {
  background: rgba(255, 255, 255, 0.04);
}

/* State classes (per INFRA §7.3) */
.is-active  { /* toggled on by JS */ }
.is-hidden  { display: none !important; }
.is-dragging { cursor: grabbing; user-select: none; }
.is-editing  { outline: 2px solid var(--c-ambient-sparkle); }

  "ui.drilldown.cashflow.cumulative": "Кумулятив",
  "ui.drilldown.cashflow.explanation": "Годовой денежный поток складывается из трёх компонентов: операционный (основная деятельность), инвестиционный (капитальные вложения в производство контента) и финансовый (привлечение капитала, погашение долга). Net CF = Op + Inv + Fin. Накопительная линия показывает совокупный Net CF на конец каждого года: портфель выходит в плюс после релизов 2030 года и завершает горизонт с cumulative ≈ 1 250 млн ₽.",

  "ui.drilldown.cashflow.methodology": "Источник: cashflow.yearly (deck_data v1.2.0) — пять опорных лет: 2026 (инвестиции), 2029 (финансирование), 2030 (первые операционные поступления и остаток финансирования), 2031–2032 (чисто операционные поступления пост-релиз). Сценарии: bull масштабирует operating и financing на ×1.2, bear на ×0.6; investing зафиксирован (CAPEX принят). Cumulative считается как накопительная сумма Net CF по годам от 2026 к 2032.",

  "ui.drilldown.ebitda.ebitda": "EBITDA",
  "ui.drilldown.ebitda.explanation": "EBITDA складывается из выручки за вычетом прямых затрат (COGS) и операционных расходов (OPEX). Маржа — отношение EBITDA к выручке в процентах. В bull-сценарии EBITDA масштабируется × 1.25, в bear — × 0.60.",

  "ui.drilldown.irr.explanation": "Тепловая карта показывает устойчивость IRR портфеля к двум ключевым параметрам: ставке дисконтирования (discount rate, 10–25%) и горизонту инвестирования (3–10 лет). Цвет ячейки кодирует зону риска: красный (IRR < 10%) — ниже WACC, жёлтый (10–18%) — умеренная премия, зелёный (> 18%) — целевой возврат, тёмно-зелёный (> 25%) — премиальный сценарий. Активная ячейка подсвечена золотой рамкой и соответствует текущему положению слайдеров.",
  "ui.drilldown.irr.horizon": "Горизонт",
  "ui.drilldown.irr.irr": "IRR",
  "ui.drilldown.irr.methodology": "Опорная точка: WACC = 19%, горизонт = 5 лет, детерминированный IRR = 20.09% (anchor в deck_data.sensitivity.irr_matrix). Формула чувствительности: IRR(r, h) = IRR_det × (1 − α·(r − r₀)/r₀ + β·(h − h₀)/h₀), где α ≈ 0.28 (эластичность к ставке), β ≈ 0.14 (к горизонту), r₀ = 19%, h₀ = 5 лет. Матрица монотонна: при росте ставки IRR снижается, при росте горизонта растёт. Значения 7×4 = 28 ячеек предвычислены и валидированы в S41 audit.",
  "ui.drilldown.irr.rate": "Ставка",
  "ui.drilldown.irr.title": "IRR Sensitivity — детализация",
  "ui.drilldown.mc.bin": "Интервал IRR",
  "ui.drilldown.mc.count": "Частота",
  "ui.drilldown.mc.cumulative": "Накопит.",
  "ui.drilldown.mc.explanation": "Гистограмма показывает распределение IRR по результатам 50 000 симуляций Monte Carlo. Золотая пунктирная линия на 20,09% — детерминированный целевой IRR (главный таргет). Цветные маркеры — перцентили P5 (−0,4%), P50 (12,0%) и P95 (21,1%). Ползунок стресса смещает среднее и расширяет дисперсию согласно таблице stress_levels.",
  "ui.drilldown.mc.methodology": "Источник: mc.irr_distribution (30 бинов шириной 1,5 п.п.), mc.percentiles, mc.stress_levels. N = 50 000 итераций, seed = 42, 5 стохастических переменных: тайминг релизов (Poisson λ=0,5), hit-rate (Triangular 0,40/0,70/1,00), отклонение бюджета, дисконт-фактор, валютный риск. При stress > 0 бины пересчитываются аналитически как N(μ + mean_shift, σ · sigma_mult) с линейной интерполяцией между опорными уровнями 0/25/50/75/100.",
  "ui.drilldown.mc.probability": "Вероятность",
  "ui.drilldown.mc.title": "Monte Carlo — детализация бина",
  "ui.drilldown.peers.company": "Компания",
  "ui.drilldown.peers.explanation": "Все значения — synthetic-mock, real peer-set в Phase 2C после NDA. Сравнение только для иллюстрации позиционирования.",
  "ui.drilldown.peers.methodology": "Ось X: EV/EBITDA (×) — отношение enterprise value к EBITDA за последний отчётный период. Ось Y: IRR historic (%) — историческая доходность капитала по проектам студии за 3-5 лет. Размер точки пропорционален EV/Revenue. Цвет обозначает страну (RU/US/FR). Золотая звезда — проект TrendStudio с IRR-projected по базовому сценарию. Валидация мультипликаторов и NDA-доступ к trading comps — Phase 2C (v1.2.1).",
  "ui.drilldown.peers.region": "Регион",

  "ui.drilldown.pipeline.explanation": "Карточка проекта: код, жанр/тип (фильм или сериал), стадия производства (Script → Development → Pre-Production → Production → Post-Production → Release), горизонт производства по кварталам, релизная дата, бюджет и прогнозируемая выручка в млн ₽. Цвет полосы в диаграмме Ганта отражает текущую стадию; штриховка отличает сериал от фильма; пунктирная линия с шестерёнкой помечает дату релиза.",
  "ui.drilldown.pipeline.methodology": "Источник: pipeline.projects (deck_data v1.2.0). Горизонт 2025-Q1 … 2028-Q4 (16 кварталов). Бюджет указан как прямые продюсерские затраты, выручка — консолидированный план продаж по всем окнам (theatrical + цифровые + ТВ). Bull/Bear сценарии масштабируют выручку через мультипликаторы pipeline.revenue_by_year, производственные сроки и бюджет не меняются.",

  "ui.drilldown.cashflow.cumulative": "Cumulative",
  "ui.drilldown.cashflow.explanation": "Annual cash flow consists of three components: operating (ongoing business), investing (capex into content production) and financing (capital raised, debt service). Net CF = Op + Inv + Fin. The cumulative line plots running Net CF at year end: the portfolio turns positive after 2030 releases and finishes the horizon at cumulative approx 1,250 RUB million.",
  "ui.drilldown.cashflow.financing": "Financing",

  "ui.drilldown.cashflow.methodology": "Source: cashflow.yearly (deck_data v1.2.0) with five anchor years: 2026 (investing), 2029 (financing), 2030 (first operating inflows plus remaining financing), 2031-2032 (pure operating inflows post-release). Scenarios: bull scales operating and financing by x1.2, bear by x0.6; investing is held flat (capex committed). Cumulative is the running sum of Net CF across years from 2026 to 2032.",

  "ui.drilldown.ebitda.explanation": "EBITDA equals revenue minus direct costs (COGS) and operating expenses (OPEX). Margin is the ratio of EBITDA to revenue in percent. Under the bull scenario EBITDA is scaled by x1.25, under bear by x0.60.",
  "ui.drilldown.ebitda.margin": "Margin",
  "ui.drilldown.ebitda.methodology": "Source: pnl.ebitda_breakdown (deck_data v1.2.0) across three years 2026–2028. COGS and OPEX are expressed as negative values so Revenue + COGS + OPEX = EBITDA. Average 3-year margin in the base case is 47.7%. Bull/Bear apply stress multipliers to EBITDA while holding revenue and costs flat, so the margin moves proportionally with EBITDA.",
  "ui.drilldown.ebitda.revenue": "Revenue",
  "ui.drilldown.ebitda.title": "EBITDA breakdown — detail view",
  "ui.drilldown.irr.explanation": "The heatmap shows how the portfolio IRR responds to two key inputs: the discount rate (10–25%) and the investment horizon (3–10 years). Cell color encodes the risk zone: red (IRR < 10%) is below WACC, yellow (10–18%) is a moderate premium, green (> 18%) is the target return, dark-green (> 25%) is a premium scenario. The active cell is outlined in gold and tracks the current slider position.",
  "ui.drilldown.irr.horizon": "Horizon",
  "ui.drilldown.irr.irr": "IRR",
  "ui.drilldown.irr.methodology": "Anchor: WACC = 19%, horizon = 5 years, deterministic IRR = 20.09% (anchor in deck_data.sensitivity.irr_matrix). Sensitivity formula: IRR(r, h) = IRR_det × (1 − α·(r − r₀)/r₀ + β·(h − h₀)/h₀), with α ≈ 0.28 (rate elasticity), β ≈ 0.14 (horizon elasticity), r₀ = 19%, h₀ = 5 years. The matrix is monotone: IRR falls as the rate rises and grows as the horizon extends. All 7×4 = 28 cells are pre-computed and validated in the S41 audit.",
  "ui.drilldown.irr.rate": "Rate",
  "ui.drilldown.irr.title": "IRR Sensitivity — detail view",
  "ui.drilldown.mc.bin": "IRR bin",
  "ui.drilldown.mc.count": "Frequency",
  "ui.drilldown.mc.cumulative": "Cumulative",
  "ui.drilldown.mc.explanation": "The histogram shows the IRR distribution across 50,000 Monte Carlo simulations. The gold dashed line at 20.09% marks the deterministic target IRR (primary headline metric). Coloured markers indicate percentiles P5 (-0.4%), P50 (12.0%) and P95 (21.1%). The stress slider shifts the mean and widens the dispersion according to the stress_levels table.",
  "ui.drilldown.mc.methodology": "Source: mc.irr_distribution (30 bins, 1.5 pp wide), mc.percentiles, mc.stress_levels. N = 50,000 iterations, seed = 42, 5 stochastic variables: release timing (Poisson lambda=0.5), hit rate (Triangular 0.40/0.70/1.00), budget variance, discount factor, FX risk. For stress > 0 the bins are re-sampled analytically as N(mu + mean_shift, sigma * sigma_mult) with linear interpolation between the 0/25/50/75/100 anchor levels.",
  "ui.drilldown.mc.probability": "Probability",

  "ui.drilldown.peers.methodology": "X-axis: EV/EBITDA (×) — enterprise value to EBITDA for the latest reporting period. Y-axis: IRR historic (%) — historical return on capital on the studio's 3–5 year project portfolio. Bubble size is proportional to EV/Revenue. Color encodes country (RU/US/FR). The gold star is the TrendStudio project with IRR-projected under the base scenario. Multiple validation and NDA access to trading comps — Phase 2C (v1.2.1).",

(function() {

  /**
   * Read a key from URL with priority cascade:
   * 1. ?key=value (query param)
   * 2. #key=value (hash param)
   * 3. sessionStorage.getItem(key)
   * 4. fallback
   */
  function readURLPriority(key, fallback) {
    // 1. Query param
    try {
      var params = new URLSearchParams(window.location.search);
      if (params.has(key)) return params.get(key);
    } catch (e) { /* URLSearchParams not supported — skip */ }

    // 2. Hash param
    var hash = window.location.hash.replace(/^#/, '');
    var hashParts = hash.split('&');
    for (var i = 0; i < hashParts.length; i++) {
      var pair = hashParts[i].split('=');
      if (pair[0] === key && pair.length > 1) return pair[1];
    }

    // 3. sessionStorage
    try {
      var stored = sessionStorage.getItem(key);
      if (stored !== null) return stored;
    } catch (e) { /* sessionStorage blocked */ }

    // 4. fallback
    return fallback;
  }

   * Update hash param without triggering navigation.
   * Preserves other hash params.
   */
  function updateURLHash(key, value) {
    var hash = window.location.hash.replace(/^#/, '');
    var parts = hash ? hash.split('&') : [];
    var found = false;
    var newParts = [];
    for (var i = 0; i < parts.length; i++) {
      var pair = parts[i].split('=');
      if (pair[0] === key) {
        newParts.push(key + '=' + encodeURIComponent(value));
        found = true;
      } else if (parts[i]) {
        newParts.push(parts[i]);
      }
    }
    if (!found) newParts.push(key + '=' + encodeURIComponent(value));

    var newHash = newParts.join('&');
    if (typeof history !== 'undefined' && history.replaceState) {
      history.replaceState(null, '', window.location.pathname + window.location.search + '#' + newHash);
    } else {
      window.location.hash = newHash;
    }

    try { sessionStorage.setItem(key, value); } catch (e) { /* blocked */ }

      ];

      if (p.region) m.push({ label: t('ui.drilldown.peers.region', 'Регион'), value: p.region });
      return m;
    }
  };

  function metrics(chart, p) {
    var fn = MAP[chart];
    if (fn) { try { return fn(p || {}); } catch (e) { return []; } }
    var list = [];
    if (p && typeof p === 'object') Object.keys(p).forEach(function(k) { list.push({ label: k, value: String(p[k]) }); });
    return list;
  }

  function buildBody(chart, payload) {
    var wrap = document.createElement('div');
    wrap.setAttribute('data-drilldown-chart', chart);

    if (chart === 'peers' && payload && payload.synthetic === true) {
      var w = document.createElement('div');
      w.className = 'ts-drilldown-warning';
      w.setAttribute('data-synthetic', 'true');
      w.setAttribute('role', 'note');
      w.style.cssText = 'background:rgba(255,180,0,0.08);border:1px solid rgba(255,180,0,0.35);border-radius:8px;padding:10px 12px;margin-bottom:12px;color:#FFB400;font-size:13px;';
      w.textContent = t('ui.drilldown.common.warning_synthetic',
        '\u26A0 Данные-заглушка: peer-set обновится в Phase 2C после NDA');
      wrap.appendChild(w);
    }

    var card = (TS.Components && TS.Components.DrilldownCard)
      ? TS.Components.DrilldownCard({
          title: t('ui.drilldown.' + chart + '.title', chart),
          subtitle: t('ui.drilldown.' + chart + '.explanation', '') || undefined,
          metrics: metrics(chart, payload),
          description: t('ui.drilldown.' + chart + '.methodology', '') || undefined
        })
      : document.createElement('div');
    wrap.appendChild(card);
    return wrap;
  }

  function open(chart, payload) {
    close();
    if (!TS.Components || !TS.Components.Modal) return null;
    var title = t('ui.drilldown.' + chart + '.title', chart);
    var aria  = t('a11y.drilldown.' + chart + '.label', title);
    var m = TS.Components.Modal({
      title: title,
      body: buildBody(chart, payload),
      ariaLabel: aria,
      onClose: function() { if (_active === m) _active = null; }
    });
    _active = m;
    m.open();
    return m;
  }

  function close() {
    if (_active && typeof _active.close === 'function') { try { _active.close(); } catch (e) {} }
    _active = null;
  }

  function init() {
    if (_inited || !TS.on) return;
    _inited = true;
    _handler = function(evt) {
      if (!evt || !evt.chart) return;
      open(evt.chart, evt.payload || {});
    };
    TS.on('drilldown:open', _handler);
  }

  TS.Drilldown = { init: init, open: open, close: close };

  if (typeof document !== 'undefined') {
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  }
})();

/* S05: Pipeline — LP CRITICAL CHART (Gantt-style horizontal bar)
   7 projects with stage-colored bars on a timeline axis.
   Data from TS.chartData('s05_pipeline') and TS.slide(5). */
(function() {
  'use strict';

  var C = window.TS.Components;
  var chartId = 'chart-5-pipeline';

  // Stage-to-color mapping (cinematic dark palette)
  var stageColors = {
    'Script':          'rgba(139,92,246,0.85)',    // purple
    'Development':     'rgba(59,130,246,0.85)',     // blue
    'Pre-Production':  'rgba(6,182,212,0.85)',      // cyan
    'Production':      'rgba(16,185,129,0.85)',     // green
    'Post-Production': 'rgba(245,158,11,0.85)'      // amber
  };

  // Quarter string to numeric position on timeline (Q1 2026 = 0)
  function quarterToNum(q) {
    if (!q) return 0;
    var parts = q.match(/Q(\d)\s+(\d{4})/);
    if (!parts) return 0;
    var quarter = parseInt(parts[1], 10);
    var year = parseInt(parts[2], 10);
    return (year - 2026) * 4 + (quarter - 1);
  }

  // Stage to approximate duration in quarters before release
  function stageDuration(stage) {
    switch (stage) {
      case 'Post-Production': return 1;
      case 'Production':      return 3;
      case 'Pre-Production':  return 4;
      case 'Development':     return 6;
      case 'Script':          return 7;
      default:                return 4;
    }
  }

  NAV.registerSlide(5, {
    enter: function() {
      var slide = TS.slide(5);
      var cd = TS.chartData('s05_pipeline');
      var pipeline = (cd && cd.pipeline) || (slide && slide.pipeline) || [];
      if (!slide) return;

      // Title + subtitle
      var titleEl = document.getElementById('s05-title');
      var subtitleEl = document.getElementById('s05-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s05.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s05.subtitle');

      // Build horizontal bar chart (Gantt-style)
      var chartArea = document.getElementById('s05-chart-area');
      if (chartArea && pipeline.length) {
        chartArea.innerHTML = '';

        // Prepare labels and data
        var labels = [];
        var barData = [];
        var bgColors = [];
        var borderColors = [];

        for (var i = 0; i < pipeline.length; i++) {
          var p = pipeline[i];
          var name = I18N.t('s05.pipeline.' + i + '.name');
          labels.push(p.code + ' ' + name);

          var releaseQ = quarterToNum(p.release);
          var duration = stageDuration(p.stage);
          var startQ = Math.max(0, releaseQ - duration);

          barData.push([startQ, releaseQ]);
          bgColors.push(stageColors[p.stage] || 'rgba(201,169,97,0.85)');
          borderColors.push((stageColors[p.stage] || 'rgba(201,169,97,1)').replace('0.85', '1'));
        }

        // A11y description
        var a11yValues = pipeline.map(function(p, idx) {
          return p.code + ': ' + p.stage + ', ' + p.budget + ' ' + I18N.t('common.currency') + ', ' + p.release;
        });

        var wrapper = C.ChartWrapper(chartArea, {
          id: chartId,
          title: I18N.t('s05.title'),
          description: TS.A11y.describeChart({
            type: 'horizontal bar (Gantt)',
            title: I18N.t('s05.title'),
            labels: labels,
            values: a11yValues
          })
        });

        // Quarter labels for x-axis
        var quarterLabels = [
          'Q1 26', 'Q2 26', 'Q3 26', 'Q4 26',
          'Q1 27', 'Q2 27', 'Q3 27', 'Q4 27',
          'Q1 28', 'Q2 28', 'Q3 28', 'Q4 28'
        ];

        CHARTS.bar(chartId, {
          data: {
            labels: labels,
            datasets: [{
              label: I18N.t('s05.title'),
              data: barData,
              backgroundColor: bgColors,
              borderColor: borderColors,
              borderWidth: 1,
              borderRadius: 4,
              borderSkipped: false,
              barPercentage: 0.6,
              categoryPercentage: 0.8
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: function(ctx) {
                    return ctx[0].label;
                  },
                  label: function(ctx) {
                    var idx = ctx.dataIndex;
                    var p = pipeline[idx];
                    return [
                      p.stage,
                      p.budget + ' ' + I18N.t('common.currency'),
                      p.release
                    ];
                  }
                }
              }
            },
            scales: {
              x: {
                type: 'linear',
                min: 0,
                max: 11,
                ticks: {
                  stepSize: 1,
                  color: '#9CA3AF',
                  font: { size: 10, family: "'Inter', sans-serif" },
                  callback: function(value) {
                    return quarterLabels[value] || '';
                  }
                },
                grid: { color: 'rgba(255,255,255,0.04)' },
                title: { display: false }
              },
              y: {
                ticks: {
                  color: '#F5F5F5',
                  font: { size: 12, family: "'Inter', sans-serif" }
                },
                grid: { display: false }
              }
            }
          }
        });

        // Animate chart area in
        ANIM.from(chartArea, {
          opacity: 0,
          y: 20,
          duration: 0.8,
          ease: 'power2.out'
        });
      }

      // Note / disclosure

(function() {
  'use strict';

  var C = window.TS.Components;

  function buildTimeline(container, timeline) {
    // Wrapper for horizontal layout
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;width:100%;';

    // Horizontal track line
    var track = document.createElement('div');
    track.style.cssText = 'position:relative;width:100%;height:4px;background:var(--bg-tertiary);border-radius:2px;margin:60px 0 80px 0;';
    track.setAttribute('role', 'presentation');

    trackFill.style.cssText = 'position:absolute;top:0;left:0;height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width var(--t-slow) var(--ease-out-expo);';
    track.appendChild(trackFill);

    wrapper.appendChild(track);

    // Place markers along track
    for (var i = 0; i < timeline.length; i++) {
      var item = timeline[i];
      var pct = (i / (timeline.length - 1)) * 100;

      // Marker node (circle on track)
      var marker = document.createElement('div');
      marker.style.cssText = 'position:absolute;left:' + pct + '%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--gold);border:3px solid var(--bg-primary);box-shadow:0 0 12px rgba(201,169,97,0.4);z-index:2;';
      track.appendChild(marker);

      // Quarter label above
      var qLabel = document.createElement('div');
      qLabel.style.cssText = 'position:absolute;left:' + pct + '%;bottom:calc(100% + 16px);transform:translateX(-50%);font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:center;';
      qLabel.textContent = item.q || '';
      track.appendChild(qLabel);

  // --- Slide 17 ---
/* S17: MC IRR Distribution — LP CRITICAL CHART
   Chart.js histogram with det_line annotation at 20.09%.
   Bins generated from data (mc_mean_irr, mc_stdev_irr) via normal approx. */
(function() {
  'use strict';

  var C = window.TS.Components;
  var CHART_ID = 'chart-17-mc-distribution';
  // Hoisted for exit() cleanup — Chart.js v4 needs unregister(pluginObject).
  var detLinePluginRef = null;

  NAV.registerSlide(17, {
    enter: function() {
      var root = document.getElementById('slide-17');
      var data = TS.slide(17);
      var chartData = TS.chartData('s17_mc_distribution');
      if (!root || !data) return;

      // Title + subtitle
      var titleEl = document.getElementById('s17-title');
      var subtitleEl = document.getElementById('s17-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s17.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s17.subtitle');

      // Chart
      var chartContainer = document.getElementById('s17-chart');
      if (chartContainer) {
        chartContainer.innerHTML = '';

        var cw = C.ChartWrapper(chartContainer, {
          id: CHART_ID,
          title: I18N.t('s17.title'),
          description: I18N.t('s17.chart_desc') || I18N.t('s17.subtitle')
        });

        var detLine = (chartData && chartData.det_line) ? chartData.det_line : 20.09;

        // Build bins from data-driven mu/sigma (normal approximation)
        var metrics = TS.data().key_metrics;
        if (!metrics || !metrics.mc_mean_irr || !metrics.mc_stdev_irr) {
          throw new Error('S17: mc_mean_irr and mc_stdev_irr required in key_metrics');
        }
        var mu = metrics.mc_mean_irr;
        var sigma = metrics.mc_stdev_irr;
        var p5 = (chartData && chartData.percentiles && chartData.percentiles[0]) ? chartData.percentiles[0].irr : mu - 1.645 * sigma;
        var p95 = (chartData && chartData.percentiles) ? chartData.percentiles[chartData.percentiles.length - 1].irr : mu + 1.645 * sigma;
        var lo = Math.floor(p5 / 3) * 3;
        var hi = Math.ceil(p95 / 3) * 3;
        var nBins = Math.max(Math.round((hi - lo) / 3), 5);
        var binWidth = (hi - lo) / nBins;

        var binLabels = [];
        var binHeights = [];
        var totalArea = 0;
        for (var b = 0; b < nBins; b++) {
          var left = lo + b * binWidth;
          var right = left + binWidth;
          binLabels.push(Math.round(left) + '% \u2013 ' + Math.round(right) + '%');
          // Normal PDF approximation at bin center
          var center = left + binWidth / 2;
          var z = (center - mu) / sigma;
          var h = Math.exp(-0.5 * z * z);
          binHeights.push(h);
          totalArea += h;
        }
        // Scale to ~50000 total
        var nSim = (chartData && chartData.n) ? chartData.n : 50000;
        for (var b2 = 0; b2 < binHeights.length; b2++) {
          binHeights[b2] = Math.round(binHeights[b2] / totalArea * nSim);
        }

        // Gold annotation plugin for deterministic IRR vertical line
        var detLinePlugin = {
          id: 'detLineAnnotation',
          afterDatasetsDraw: function(chart) {
            // Scope to this chart only (Chart.register is global in Chart.js v4).
            if (chart.canvas && chart.canvas.id !== CHART_ID) return;
            var xScale = chart.scales.x;
            var yScale = chart.scales.y;
            var ctx = chart.ctx;

            // Position det_line dynamically based on bin range
            var bars = chart.getDatasetMeta(0).data;
            if (!bars || bars.length === 0) return;

            // Calculate which bin detLine falls in and interpolate pixel X
            var detBinIdx = Math.min(Math.max(Math.floor((detLine - lo) / binWidth), 0), bars.length - 1);
            var detBar = bars[detBinIdx];
            var barWidth = detBar.width || 40;
            var fraction = ((detLine - lo) / binWidth) - detBinIdx;
            var lineX = detBar.x - barWidth / 2 + barWidth * Math.max(0, Math.min(1, fraction));

            ctx.save();
            ctx.beginPath();
            ctx.setLineDash([6, 4]);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = 'rgba(201,169,97,0.9)';
            ctx.moveTo(lineX, yScale.top);
            ctx.lineTo(lineX, yScale.bottom);
            ctx.stroke();

            // Label
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(201,169,97,1)';
            ctx.font = "bold 12px 'JetBrains Mono', monospace";
            ctx.textAlign = 'center';
            ctx.fillText(I18N.t('s17.det_irr_label') || ('Det IRR: ' + detLine + '%'), lineX, yScale.top - 8);
            ctx.restore();
          }
        };

        CHARTS.bar(CHART_ID, {
          data: {
            labels: binLabels,
            datasets: [{
              label: I18N.t('s17.frequency') || 'Frequency',
              data: binHeights,

        ANIM.from(chartContainer, {
          opacity: 0,
          y: 20,
          duration: 0.7,
          delay: 0.15,
          ease: 'power2.out'
        });
      }

      // Comparison table (W1–W4 variants)
      var tableContainer = document.getElementById('s22-table');
      if (tableContainer && chartData && chartData.comparison) {
        tableContainer.innerHTML = '';
        var comparison = chartData.comparison;
        var rows = [];
        for (var i = 0; i < comparison.length; i++) {
          var v = comparison[i];
          rows.push([
            v.variant || '',
            I18N.formatCurrency(v.investor),
            I18N.formatNumber(v.inv_pct) + '%',
            I18N.formatCurrency(v.producer),
            v.moic ? v.moic + 'x' : ''
          ]);
        }

        var table = C.DataTable(tableContainer, {
          caption: I18N.t('s22.table_caption') || I18N.t('s22.title'),
          headers: [
            I18N.t('s22.variant') || 'Variant',
            I18N.t('s22.investor') || 'Investor',
            I18N.t('s22.inv_pct') || 'Inv %',
            I18N.t('s22.producer') || 'Producer',
            I18N.t('s22.moic') || 'MOIC'
          ],
          rows: rows
        });

        // Highlight W3 row
        if (table) {
          var tbodyRows = table.querySelectorAll('tbody tr');
          for (var k = 0; k < tbodyRows.length; k++) {
            var cells = tbodyRows[k].querySelectorAll('td');
            if (cells.length > 0 && (cells[0].textContent || '').indexOf('W3') !== -1) {
              tbodyRows[k].style.cssText = 'background:rgba(201,169,97,0.12);border-left:3px solid var(--gold);';
              for (var c = 0; c < cells.length; c++) {
                cells[c].style.fontWeight = '600';
              }
            }

            ANIM.from(tbodyRows[k], {
              opacity: 0,
              x: -12,
              duration: 0.35,
              delay: 0.5 + k * 0.06,
              ease: 'power2.out'
            });
          }
        }
      }

      // Note
      var noteEl = document.getElementById('s22-note');
      if (noteEl) {
        noteEl.textContent = I18N.t('s22.note') || '';
      }

      // Tier descriptions from slide data
      var tiers = data.tiers || [];
      // Tiers are informational; rendered via the waterfall and table above
    },

    exit: function() {
      CHARTS.destroy(CHART_ID);
      ANIM.killAll();
    }
  });
})();

  // --- Slide 24 ---
/* S24: Appendices Overview — 5 appendix cards (A-E) with badges
   Passive content, no charts. */
(function() {
  'use strict';

  var C = window.TS.Components;

  function createAppendixCard(container, app, index) {
    var card = document.createElement('div');
    card.className = 'metric-card';
    card.setAttribute('role', 'group');
    card.setAttribute('aria-label', I18N.t('s24.apps.' + index + '.name'));
    card.style.cssText = 'cursor:default;display:flex;flex-direction:column;gap:12px;';

    // Appendix ID badge (e.g. "A", "B", etc.)
    var badge = C.Badge(I18N.t('s24.apps.' + index + '.id') || app.id, 'gold');
    badge.style.alignSelf = 'flex-start';
    card.appendChild(badge);

    // Appendix name
    var name = document.createElement('h3');
    name.style.cssText = 'font-size:18px;font-weight:700;color:var(--text-primary);margin:0;';
    name.textContent = I18N.t('s24.apps.' + index + '.name');
    card.appendChild(name);

    // Description
    var desc = document.createElement('p');
    desc.style.cssText = 'font-size:14px;color:var(--text-secondary);line-height:1.6;margin:0;flex:1;';
    desc.textContent = I18N.t('s24.apps.' + index + '.desc');
    card.appendChild(desc);

    // Hover effect
    card.addEventListener('mouseenter', function() {
      card.style.borderColor = 'rgba(201,169,97,0.3)';
      card.style.boxShadow = '0 0 30px rgba(201,169,97,0.15)';
    });
    card.addEventListener('mouseleave', function() {
      card.style.borderColor = '';
      card.style.boxShadow = '';
    });

    if (container) container.appendChild(card);
    return card;
  }

  NAV.registerSlide(24, {
    enter: function() {
      var root = document.getElementById('slide-24');
      var data = TS.slide(24);
      if (!root || !data) return;

      // Title + subtitle
      var titleEl = document.getElementById('s24-title');
      var subtitleEl = document.getElementById('s24-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s24.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s24.subtitle');

      // Appendix cards
      var cardsContainer = document.getElementById('s24-cards');
      if (cardsContainer) {
        cardsContainer.innerHTML = '';
        var apps = data.apps || [];
        for (var i = 0; i < apps.length; i++) {
          var card = createAppendixCard(cardsContainer, apps[i], i);
          ANIM.from(card, {
            opacity: 0,
            y: 24,
            duration: 0.7,
            delay: i * 0.12,
            ease: 'power2.out'
          });
        }
      }
    },

    exit: function() {
      ANIM.killAll();
    }
  });
})();

  // --- Slide 25 ---
/* S25: Contact & CTA — Contact cards, next steps list, disclaimer
   Passive content, no charts. */
(function() {
  'use strict';

  var C = window.TS.Components;

  function createContactCard(container, contact, index) {
    var card = document.createElement('div');
    card.className = 'metric-card';
    card.setAttribute('role', 'group');
    card.setAttribute('aria-label', I18N.t('s25.contacts.' + index + '.name'));
    card.style.cssText = 'cursor:default;display:flex;flex-direction:column;gap:10px;text-align:center;align-items:center;';

    // Role badge
    var badge = C.Badge(I18N.t('s25.contacts.' + index + '.role'), 'gold');
    card.appendChild(badge);

    // Name
    var name = document.createElement('h3');
    name.style.cssText = 'font-size:20px;font-weight:700;color:var(--text-primary);margin:0;';
    name.textContent = I18N.t('s25.contacts.' + index + '.name');
    card.appendChild(name);

    // Email
    var email = document.createElement('a');
    email.style.cssText = 'font-size:14px;color:var(--gold);text-decoration:none;';
    email.href = 'mailto:' + (contact.email || '');
    email.textContent = contact.email || '';
    card.appendChild(email);

    // Hover effect
    card.addEventListener('mouseenter', function() {
      card.style.borderColor = 'rgba(201,169,97,0.3)';
      card.style.boxShadow = '0 0 30px rgba(201,169,97,0.15)';
    });
    card.addEventListener('mouseleave', function() {
      card.style.borderColor = '';
      card.style.boxShadow = '';
    });

    if (container) container.appendChild(card);
    return card;
  }

  NAV.registerSlide(25, {
    enter: function() {
      var root = document.getElementById('slide-25');
      var data = TS.slide(25);
      if (!root || !data) return;

      // Title + subtitle
      var titleEl = document.getElementById('s25-title');
      var subtitleEl = document.getElementById('s25-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s25.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s25.subtitle');

      // Contact cards
      var contactsContainer = document.getElementById('s25-contacts');
      if (contactsContainer) {
        contactsContainer.innerHTML = '';
        var contacts = data.contacts || [];
        for (var i = 0; i < contacts.length; i++) {
          var card = createContactCard(contactsContainer, contacts[i], i);
          ANIM.from(card, {
            opacity: 0,
            y: 24,
            duration: 0.7,
            delay: i * 0.12,
            ease: 'power2.out'
          });
        }
      }

      // Next steps list
      var nextStepsContainer = document.getElementById('s25-next-steps');
      if (nextStepsContainer) {
        nextStepsContainer.innerHTML = '';
        var nextSteps = data.next_steps || [];
        var localizedSteps = [];
        for (var n = 0; n < nextSteps.length; n++) {
          localizedSteps.push(I18N.t('s25.next_steps.' + n));
        }
        var list = C.PointsList(nextStepsContainer, localizedSteps);

        // Animate list items
        var items = list.querySelectorAll('li');
        for (var j = 0; j < items.length; j++) {
          ANIM.from(items[j], {
            opacity: 0,
            x: -20,
            duration: 0.5,
            delay: 0.4 + j * 0.08,
            ease: 'power2.out'
          });
        }
      }

      // Disclaimer
      var disclaimerContainer = document.getElementById('s25-disclaimer');
      if (disclaimerContainer) {
        disclaimerContainer.textContent = I18N.t('s25.disclaimer');
        ANIM.from(disclaimerContainer, {
          opacity: 0,
          y: 12,
          duration: 0.6,
          delay: 0.8,
          ease: 'power2.out'
        });
      }
    },

    exit: function() {
      ANIM.killAll();
    }
  });
})();
