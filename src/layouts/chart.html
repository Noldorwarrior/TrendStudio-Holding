<!-- Layout: chart — header + chart area + optional note -->
<div class="slide-inner">
  <h2 class="slide-title" data-bind="title"></h2>
  <p class="slide-subtitle" data-bind="subtitle"></p>
  <div class="chart-wrapper" data-bind="chart" style="flex:1; min-height:0;"></div>
  <div class="disclosure" data-bind="note"></div>
</div>
