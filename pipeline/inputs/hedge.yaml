# ============================================================================
# hedge.yaml — Параметры FX-хеджирования (v1.3.6 Ж4)
# ============================================================================
# Описывает долю FX-экспозиции, покрытой хеджирующими инструментами
# (форварды, опционы, NDF). Применяется ПОВЕРХ fx_pass_through коэффициентов:
#   effective_pt_i = pt_i × (1 - hedge_ratio_i)
#
# Хедж снижает pass-through, но НЕ отменяет его полностью, т.к.:
#   1) Часть экспозиции обычно не хеджируется (стоимость, ликвидность)
#   2) Хедж сам имеет стоимость (спред форварда, премия опциона)
#   3) Operational drift: часть платежей может уходить вне хедж-контура
#
# По умолчанию hedge_ratio_default=0.0 → модель работает БЕЗ хеджа
# (как и все предыдущие версии). Tier D Ж4 просто даёт возможность
# включить хедж через сценарий и валидирует, что он снижает дисперсию.
# ============================================================================

coefficients:
  p_and_a:
    hedge_ratio: 0.0
    rationale: >
      По умолчанию P&A не хеджируется (маркетинг — операционные расходы,
      хеджированию обычно не подлежат). Может быть увеличен до 0.3
      для слейта с крупной международной кампанией.

  cogs:
    hedge_ratio: 0.0
    rationale: >
      COGS включают амортизацию производственных расходов, значительная
      часть которых идёт в рублях (ФОТ, локация). Хеджирование до 0.2-0.3
      имеет смысл только для VFX и зарубежной пост-продакшен части.

  production_capex:
    hedge_ratio: 0.0
    rationale: >
      Production CAPEX — наиболее хеджируемая статья: крупные платежи
      с известным графиком, часто 50-70% суммы. Реалистичная верхняя
      граница hedge_ratio = 0.7.

  infrastructure_capex:
    hedge_ratio: 0.0
    rationale: >
      Infrastructure CAPEX (студия, оборудование) — также хорошо поддаётся
      хеджу (крупные платежи поставщикам оборудования, известные даты).
      Реалистичная верхняя граница hedge_ratio = 0.6.

  valuation:
    hedge_ratio: 0.0
    rationale: >
      Terminal value / WACC — нефизический финансовый параметр, хеджу
      не подлежит. hedge_ratio всегда 0.

hedge_scenarios:
  # Предопределённые сценарии для what-if анализа
  no_hedge:
    description: "Базовый сценарий без хеджа (текущая модель v1.0–v1.3.5)"
    ratios:
      p_and_a: 0.0
      cogs: 0.0
      production_capex: 0.0
      infrastructure_capex: 0.0
      valuation: 0.0

  conservative:
    description: "Консервативное хеджирование: CAPEX + частично валютные OPEX"
    ratios:
      p_and_a: 0.15
      cogs: 0.15
      production_capex: 0.5
      infrastructure_capex: 0.4
      valuation: 0.0

  aggressive:
    description: "Максимальное покрытие всех хеджируемых статей"
    ratios:
      p_and_a: 0.30
      cogs: 0.30
      production_capex: 0.7
      infrastructure_capex: 0.6
      valuation: 0.0

