<!-- S01: Cover — TrendStudio Kinoholding -->
<section id="slide-1" class="slide" hidden aria-label="Cover slide">
  <div class="slide-inner" style="justify-content:center; align-items:center; text-align:center;">
    <!-- Cinematic background gradient overlay -->
    <div id="s01-bg" style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%, rgba(201,169,97,0.08) 0%, transparent 70%);pointer-events:none;"></div>

    <div id="s01-content" style="position:relative;z-index:1;">
      <h1 id="s01-title" class="slide-title" style="font-size:64px;margin-bottom:16px;"></h1>
      <p id="s01-subtitle" class="slide-subtitle" style="font-size:28px;margin-bottom:12px;"></p>
      <p id="s01-body" class="slide-body" style="font-size:18px;margin-bottom:40px;"></p>

      <!-- 3 badges -->
      <div id="s01-badges" style="display:flex;justify-content:center;gap:16px;margin-bottom:48px;"></div>

      <p id="s01-footer" style="font-size:12px;color:var(--text-muted);"></p>
    </div>
  </div>
</section>
