  <style>
/* S26: Theme — Design System v1.2.0
   Owner: S26 | Phase 1
   Dark cinematic palette + 16:9 layout tokens */

/* === CSS Custom Properties === */
:root {
  /* Background */
  --bg-primary:     #0A0E1A;
  --bg-secondary:   #141A2A;
  --bg-tertiary:    #1E2640;
  --bg-glass:       rgba(20,26,42,0.65);

  /* Gold accent */
  --gold:           #C9A961;
  --gold-light:     #E5C98A;
  --gold-dark:      #8B7538;
  --gold-glow:      rgba(201,169,97,0.45);

  /* Text */
  --text-primary:   #F5F5F5;
  --text-secondary: #9CA3AF;
  --text-muted:     #6B7280;

  /* Semantic */
  --success: #10B981;
  --warning: #F59E0B;
  --danger:  #EF4444;
  --info:    #60A5FA;

  /* Chart palette */
  --chart-1: #3B82F6;
  --chart-2: #8B5CF6;
  --chart-3: #10B981;
  --chart-4: #F59E0B;
  --chart-5: #EF4444;
  --chart-6: #EC4899;
  --chart-7: #06B6D4;
  --chart-8: #84CC16;

  /* Gradients */
  --grad-cinema: linear-gradient(135deg, #0A0E1A 0%, #141A2A 50%, #1E2640 100%);
  --grad-gold:   linear-gradient(135deg, #8B7538 0%, #C9A961 50%, #E5C98A 100%);
  --grad-risk:   linear-gradient(90deg, #10B981 0%, #F59E0B 50%, #EF4444 100%);

  /* Shadows */
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.30);
  --shadow-md:   0 8px 24px rgba(0,0,0,0.45);
  --shadow-lg:   0 20px 60px rgba(0,0,0,0.60);
  --shadow-gold: 0 0 40px rgba(201,169,97,0.35);

  /* Borders */
  --border-subtle: 1px solid rgba(255,255,255,0.06);
  --border-gold:   1px solid rgba(201,169,97,0.25);

  /* Radius */
  --r-sm: 6px;  --r-md: 12px;  --r-lg: 20px;  --r-xl: 32px;

  /* Easing */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out-q: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Timing */
  --t-fast: 160ms;  --t-base: 320ms;  --t-slow: 720ms;  --t-epic: 1600ms;

  /* Typography */
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-display: 'Georgia', serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', monospace;

  /* Layout (16:9) */
  --slide-w: 1920px;
  --slide-h: 1080px;
  --slide-pad: 80px;
  --slide-pad-x: 120px;
}

/* === Reset === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Accessibility === */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.sr-only-focusable:focus {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10000;
  width: auto;
  height: auto;
  padding: 12px 24px;
  margin: 0;
  overflow: visible;
  clip: auto;
  white-space: normal;
  background: var(--gold);
  color: var(--bg-primary);
  font-weight: 600;
  text-decoration: none;
}

/* === Navigation === */
#deck-nav {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 24px;
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  border: var(--border-subtle);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-md);
  transition: opacity var(--t-base) var(--ease-out-expo);
}

#deck-nav button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: var(--r-sm);
  transition: color var(--t-fast), background var(--t-fast);
}

#deck-nav button:hover:not(:disabled) {
  color: var(--gold);
  background: rgba(201,169,97,0.1);
}

#deck-nav button:disabled {
  opacity: 0.3;
  cursor: default;
}

#deck-nav button:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

#nav-indicator {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 14px;
  min-width: 60px;
  text-align: center;
}

/* === Slide Container === */
.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--grad-cinema);
  overflow: hidden;
}

.slide[hidden] {
  display: none;
}

.slide-inner {
  width: 100%;
  max-width: var(--slide-w);
  height: 100%;
  margin: 0 auto;
  padding: var(--slide-pad) var(--slide-pad-x);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* === Typography === */
.slide-title {
  font-family: var(--font-display);
  font-size: 42px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.slide-subtitle {
  font-size: 20px;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 32px;
}

.slide-body {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* === Cards === */
.metric-card {
  background: var(--bg-secondary);
  border: var(--border-subtle);
  border-radius: var(--r-md);
  padding: 24px;
  transition: transform var(--t-fast) var(--ease-out-expo), box-shadow var(--t-fast);
}

.metric-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.metric-card__value {
  font-family: var(--font-mono);
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.1;
}

.metric-card__label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* === Chart wrapper === */
.chart-wrapper {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
}

.chart-wrapper figure {
  width: 100%;
  height: 100%;
  margin: 0;
}

.chart-wrapper canvas {
  width: 100% !important;
  height: 100% !important;
}

/* === Grid layouts === */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 24px; }

/* === Tables === */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.data-table th {
  text-align: left;
  padding: 10px 16px;
  color: var(--gold);
  font-weight: 600;
  border-bottom: 2px solid rgba(201,169,97,0.3);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.data-table td {
  padding: 10px 16px;
  border-bottom: var(--border-subtle);
  color: var(--text-secondary);
}

.data-table tr:hover td {
  background: rgba(255,255,255,0.02);
}

.data-table .num {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text-primary);
}

/* === Badges === */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 6px 16px;
  border-radius: var(--r-xl);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.badge--gold {
  background: rgba(201,169,97,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,169,97,0.3);
}

.badge--critical { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge--high     { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.badge--medium   { background: rgba(59,130,246,0.15); color: var(--info); border: 1px solid rgba(59,130,246,0.3); }
.badge--low      { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

/* === Disclosure/Notes === */
.disclosure {
  font-size: 12px;
  color: var(--text-muted);
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border-left: 3px solid var(--gold-dark);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-top: auto;
}

/* === Formula box === */
.formula-box {
  font-family: var(--font-mono);
  font-size: 15px;
  color: var(--gold-light);
  background: var(--bg-tertiary);
  padding: 16px 24px;
  border-radius: var(--r-md);
  border: var(--border-gold);
  text-align: center;
}

/* === Progress/bar indicators === */
.bar-h {
  height: 8px;
  border-radius: 4px;
  background: var(--bg-tertiary);
  overflow: hidden;
}

.bar-h__fill {
  height: 100%;
  border-radius: 4px;
  transition: width var(--t-slow) var(--ease-out-expo);
}

/* === Tooltip === */
.tooltip-portal {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  padding: 8px 14px;
  background: var(--bg-secondary);
  border: var(--border-gold);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-md);
  font-size: 13px;
  color: var(--text-primary);
  max-width: 280px;
  opacity: 0;
  transition: opacity var(--t-fast);
}

.tooltip-portal.visible {
  opacity: 1;
}

/* === Reduced motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* === Focus visible === */
:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* === Print (minimal) === */
@media print {
  #deck-nav, #skip-link, #a11y-live { display: none; }
  .slide { page-break-after: always; position: relative; height: auto; }
  .slide[hidden] { display: block; }
}

  </style>

  // === ORCHESTRATOR ===
/* S32: Orchestrator — scenario/event bus + init sequence
   Owner: S32 | Phase 1
   Dependencies: macros.js (TS, NAV, ANIM, CHARTS, I18N) */

(function() {
  'use strict';

  // Init sequence: called on DOMContentLoaded
  function init() {
    // 1. Init i18n
    if (window.I18N && I18N.init) I18N.init();

    // 2. Init keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowRight':
        case 'PageDown':
          e.preventDefault();
          NAV.next();
          break;
        case 'ArrowLeft':
        case 'PageUp':
          e.preventDefault();
          NAV.prev();
          break;
        case 'Home':
          e.preventDefault();
          NAV.go(1);
          break;
        case 'End':
          e.preventDefault();
          NAV.go(25);
          break;
      }
    });

    // 3. Init nav buttons
    var prevBtn = document.getElementById('nav-prev');
    var nextBtn = document.getElementById('nav-next');
    if (prevBtn) prevBtn.addEventListener('click', function() { NAV.prev(); });
    if (nextBtn) nextBtn.addEventListener('click', function() { NAV.next(); });

    // 4. Trigger first slide enter
    var firstSlide = document.getElementById('slide-1');
    if (firstSlide) firstSlide.hidden = false;

    // Wait for all slides to register, then enter slide 1
    requestAnimationFrame(function() {
      setTimeout(function() {
        NAV.go(1);
        // Make body visible
        document.body.classList.add('fonts-loaded');
      }, 50);
    });
  }

  // Event bus: scenario change (Phase 2 stub)
  window.TS.on('scenario:change', function(scenario) {
    window.TS.scenario = scenario;
    // Phase 2: update all slides with new scenario data
  });

  // Run init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

/* S05: Pipeline — LP CRITICAL CHART (Gantt-style horizontal bar)
   7 projects with stage-colored bars on a timeline axis.
   Data from TS.chartData('s05_pipeline') and TS.slide(5). */
(function() {
  'use strict';

  var C = window.TS.Components;
  var chartId = 'chart-5-pipeline';

  // Stage-to-color mapping (cinematic dark palette)
  var stageColors = {
    'Script':          'rgba(139,92,246,0.85)',    // purple
    'Development':     'rgba(59,130,246,0.85)',     // blue
    'Pre-Production':  'rgba(6,182,212,0.85)',      // cyan
    'Production':      'rgba(16,185,129,0.85)',     // green
    'Post-Production': 'rgba(245,158,11,0.85)'      // amber
  };

  // Quarter string to numeric position on timeline (Q1 2026 = 0)
  function quarterToNum(q) {
    if (!q) return 0;
    var parts = q.match(/Q(\d)\s+(\d{4})/);
    if (!parts) return 0;
    var quarter = parseInt(parts[1], 10);
    var year = parseInt(parts[2], 10);
    return (year - 2026) * 4 + (quarter - 1);
  }

  // Stage to approximate duration in quarters before release
  function stageDuration(stage) {
    switch (stage) {
      case 'Post-Production': return 1;
      case 'Production':      return 3;
      case 'Pre-Production':  return 4;
      case 'Development':     return 6;
      case 'Script':          return 7;
      default:                return 4;
    }
  }

  NAV.registerSlide(5, {
    enter: function() {
      var slide = TS.slide(5);
      var cd = TS.chartData('s05_pipeline');
      var pipeline = (cd && cd.pipeline) || (slide && slide.pipeline) || [];
      if (!slide) return;

      // Title + subtitle
      var titleEl = document.getElementById('s05-title');
      var subtitleEl = document.getElementById('s05-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s05.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s05.subtitle');

      // Build horizontal bar chart (Gantt-style)
      var chartArea = document.getElementById('s05-chart-area');
      if (chartArea && pipeline.length) {
        chartArea.innerHTML = '';

        // Prepare labels and data
        var labels = [];
        var barData = [];
        var bgColors = [];
        var borderColors = [];

        for (var i = 0; i < pipeline.length; i++) {
          var p = pipeline[i];
          var name = I18N.t('s05.pipeline.' + i + '.name');
          labels.push(p.code + ' ' + name);

          var releaseQ = quarterToNum(p.release);
          var duration = stageDuration(p.stage);
          var startQ = Math.max(0, releaseQ - duration);

          barData.push([startQ, releaseQ]);
          bgColors.push(stageColors[p.stage] || 'rgba(201,169,97,0.85)');
          borderColors.push((stageColors[p.stage] || 'rgba(201,169,97,1)').replace('0.85', '1'));
        }

        // A11y description
        var a11yValues = pipeline.map(function(p, idx) {
          return p.code + ': ' + p.stage + ', ' + p.budget + ' ' + I18N.t('common.currency') + ', ' + p.release;
        });

        var wrapper = C.ChartWrapper(chartArea, {
          id: chartId,
          title: I18N.t('s05.title'),
          description: TS.A11y.describeChart({
            type: 'horizontal bar (Gantt)',
            title: I18N.t('s05.title'),
            labels: labels,
            values: a11yValues
          })
        });

        // Quarter labels for x-axis
        var quarterLabels = [
          'Q1 26', 'Q2 26', 'Q3 26', 'Q4 26',
          'Q1 27', 'Q2 27', 'Q3 27', 'Q4 27',
          'Q1 28', 'Q2 28', 'Q3 28', 'Q4 28'
        ];

        CHARTS.bar(chartId, {
          data: {

              borderWidth: 1,
              borderRadius: 4,
              borderSkipped: false,
              barPercentage: 0.6,
              categoryPercentage: 0.8
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {

                    var p = pipeline[idx];
                    return [

                    ];

                }

                ticks: {
                  stepSize: 1,
                  color: '#9CA3AF',
                  font: { size: 10, family: "'Inter', sans-serif" },
                  callback: function(value) {
                    return quarterLabels[value] || '';
                  }

/* S11: Pipeline Timeline
   Quarterly release timeline with CF markers. Passive content. */
(function() {
  'use strict';

  var C = window.TS.Components;

  function buildTimeline(container, timeline) {
    // Wrapper for horizontal layout
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;width:100%;';

    // Horizontal track line
    var track = document.createElement('div');
    track.style.cssText = 'position:relative;width:100%;height:4px;background:var(--bg-tertiary);border-radius:2px;margin:60px 0 80px 0;';
    track.setAttribute('role', 'presentation');

    // Gold progress fill
    var trackFill = document.createElement('div');
    trackFill.style.cssText = 'position:absolute;top:0;left:0;height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width var(--t-slow) var(--ease-out-expo);';
    track.appendChild(trackFill);

    wrapper.appendChild(track);

    // Place markers along track
    for (var i = 0; i < timeline.length; i++) {
      var item = timeline[i];
      var pct = (i / (timeline.length - 1)) * 100;

      // Marker node (circle on track)
      var marker = document.createElement('div');
      marker.style.cssText = 'position:absolute;left:' + pct + '%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--gold);border:3px solid var(--bg-primary);box-shadow:0 0 12px rgba(201,169,97,0.4);z-index:2;';
      track.appendChild(marker);

      // Quarter label above
      var qLabel = document.createElement('div');
      qLabel.style.cssText = 'position:absolute;left:' + pct + '%;bottom:calc(100% + 16px);transform:translateX(-50%);font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:center;';
      qLabel.textContent = item.q || '';
      track.appendChild(qLabel);

      // Releases below
      var releasesEl = document.createElement('div');
      releasesEl.style.cssText = 'position:absolute;left:' + pct + '%;top:calc(100% + 16px);transform:translateX(-50%);text-align:center;white-space:nowrap;';

      var releases = item.releases || [];
      for (var r = 0; r < releases.length; r++) {
        var badge = document.createElement('span');
        badge.className = 'badge badge--gold';
        badge.style.cssText = 'margin:2px 4px;font-size:12px;';
        badge.textContent = releases[r];
        releasesEl.appendChild(badge);
      }

      // CF value
      if (item.cf_in) {
        var cfEl = document.createElement('div');
        cfEl.style.cssText = 'margin-top:8px;font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);';
        cfEl.textContent = I18N.formatCurrency(item.cf_in);
        releasesEl.appendChild(cfEl);
      }

      track.appendChild(releasesEl);

      // Animate marker
      ANIM.from(marker, {
        opacity: 0,
        scale: 0,
        duration: 0.4,
        delay: 0.2 + i * 0.15,
        ease: 'back.out(1.7)'
      });

      ANIM.from(qLabel, {
        opacity: 0,
        y: 10,
        duration: 0.4,
        delay: 0.3 + i * 0.15,
        ease: 'power2.out'
      });

      ANIM.from(releasesEl, {
        opacity: 0,
        y: -10,
        duration: 0.4,
        delay: 0.35 + i * 0.15,
        ease: 'power2.out'
      });
    }

    container.appendChild(wrapper);

    // Animate the gold fill
    requestAnimationFrame(function() {
      trackFill.style.width = '100%';
    });
  }

          '19% \u2013 22%'
        ];
        var binHeights = [500, 2500, 6000, 12000, 14000, 8000, 4500, 2000, 500];

        // Gold annotation plugin for deterministic IRR vertical line
        var detLinePlugin = {
          id: 'detLineAnnotation',
          afterDatasetsDraw: function(chart) {
            var xScale = chart.scales.x;
            var yScale = chart.scales.y;
            var ctx = chart.ctx;

            // det_line at 20.09% falls in the last bin (19-22%), ~position at bin index 8
            // Calculate pixel X for the last bin center area
            var lastBarMeta = chart.getDatasetMeta(0).data;
            if (!lastBarMeta || lastBarMeta.length === 0) return;

            // Position within the last bin: (20.09 - 19) / (22 - 19) = ~0.36 of bin width
            var lastBar = lastBarMeta[lastBarMeta.length - 1];
            var barWidth = lastBar.width || 40;
            var lineX = lastBar.x - barWidth / 2 + barWidth * 0.36;

            ctx.save();
            ctx.beginPath();
            ctx.setLineDash([6, 4]);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = 'rgba(201,169,97,0.9)';
            ctx.moveTo(lineX, yScale.top);
            ctx.lineTo(lineX, yScale.bottom);

            // Label

            ctx.fillStyle = 'rgba(201,169,97,1)';

/* S20: Top 10 Risks — LP CRITICAL CHART
   Horizontal bar chart (severity color-coded) + styled risk table. */
(function() {
  'use strict';

  var C = window.TS.Components;
  var CHART_ID = 'chart-20-top-risks';

  // Map risk level to bar color
  function levelColor(lvl) {
    var l = (lvl || '').toUpperCase();
    if (l === 'CRITICAL') return 'rgba(239,68,68,0.85)';
    if (l === 'HIGH')     return 'rgba(245,158,11,0.85)';
    if (l === 'MEDIUM')   return 'rgba(59,130,246,0.85)';
    return 'rgba(16,185,129,0.85)';
  }

  // Numeric severity for bar height
  function levelValue(lvl) {
    var l = (lvl || '').toUpperCase();
    if (l === 'CRITICAL') return 4;
    if (l === 'HIGH')     return 3;
    if (l === 'MEDIUM')   return 2;
    return 1;
  }

  NAV.registerSlide(20, {
    enter: function() {
      var root = document.getElementById('slide-20');
      var data = TS.slide(20);
      var chartData = TS.chartData('s20_top_risks');
      if (!root || !data) return;

      var risks = (chartData && chartData.top_risks) ? chartData.top_risks : [];

      // Title + subtitle

      var subtitleEl = document.getElementById('s20-subtitle');
      if (titleEl) titleEl.textContent = I18N.t('s20.title');
      if (subtitleEl) subtitleEl.textContent = I18N.t('s20.subtitle');

      // Horizontal bar chart
      var chartContainer = document.getElementById('s20-chart');
      if (chartContainer && risks.length > 0) {
        chartContainer.innerHTML = '';

          id: CHART_ID,

          description: I18N.t('s20.chart_desc') || I18N.t('s20.subtitle')
        });

        var labels = [];
        var values = [];
        var colors = [];
        for (var i = 0; i < risks.length; i++) {
          var r = risks[i];
          labels.push(r.name || ('Risk ' + r.rank));
          values.push(levelValue(r.lvl));
          colors.push(levelColor(r.lvl));
        }

        CHARTS.bar(CHART_ID, {
          data: {

              label: I18N.t('s20.severity') || 'Severity',

          options: {

            },
            scales: {

                ticks: {
                  color: '#9CA3AF',

            x: -20,
            duration: 0.5,
            delay: 0.4 + j * 0.08,
            ease: 'power2.out'
          });
        }
      }

      // Disclaimer
      var disclaimerContainer = document.getElementById('s25-disclaimer');
      if (disclaimerContainer) {
        disclaimerContainer.textContent = I18N.t('s25.disclaimer');
        ANIM.from(disclaimerContainer, {
          opacity: 0,
          y: 12,
          duration: 0.6,
          delay: 0.8,
          ease: 'power2.out'
        });
      }
    },

    exit: function() {
      ANIM.killAll();
    }
  });
})();


  </script>
</body>
</html>
