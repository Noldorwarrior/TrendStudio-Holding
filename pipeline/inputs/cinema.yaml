distribution_params:
  theatrical_window_days: 90          # окно кинотеатрального проката
  vpf_per_copy_rub: 1500.0            # Virtual Print Fee
  avg_copies_per_release: 1200
  p_and_a_budget_ratio: 0.40          # P&A = 40% от бокс-офиса (см. pa_costs.yaml)
  min_distribution_fee_pct: 0.10

revenue_recognition:
