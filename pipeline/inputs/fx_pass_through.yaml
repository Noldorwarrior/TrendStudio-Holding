# ============================================================================
# fx_pass_through.yaml — Коэффициенты FX pass-through по статьям затрат
# ============================================================================
# Смысл: какая доля статьи затрат реагирует на изменение курса USD/RUB.
#   Например, если p_and_a = 0.25 и ΔFX = +10%, то P&A × (1 + 0.25 × 0.10)
#   = P&A × 1.025.
#
# История версий:
#   v1.3    (2026-04-11): введено для устранения магических чисел. Все
#                         5 коэффициентов на экспертной оценке.
#   v1.3.1  (2026-04-11): infrastructure_capex триангулирован 0.50 → 0.74
#                         по 5+ независимым источникам. Остальные без
#                         изменений.
#   v1.3.5  (2026-04-11): Tier C — триангулированы оставшиеся 4 коэффициента
#                         (p_and_a, cogs, production_capex, valuation) по
#                         открытым источникам + структурным декомпозициям.
#                         Методология: медиана + флаг low confidence при
#                         расхождении ≥15 п.п.
#                         См. inputs/fx_pass_through_calibration.md для
#                         полной документации источников и расчётов.
#
# Итоговые изменения v1.3 → v1.3.5:
#   p_and_a             0.30 → 0.25   (−0.05, medium confidence)
#   cogs                0.20 → 0.22   (+0.02, medium confidence)
#   production_capex    0.20 → 0.40   (+0.20, LOW CONFIDENCE — требуется
#                                       прямой опрос производственного блока)
#   infrastructure_capex 0.74 (без изменений, medium-high v1.3.1)
#   valuation           0.15 → 0.20   (+0.05, medium confidence)
#
# Метаморфический инвариант (tests/test_perturbation.py):
#   При пропорциональном масштабировании всех коэффициентов в α раз
#   |ΔEBITDA(α × pt)| ≈ α × |ΔEBITDA(pt)| ± 5%
#   (локально-линейная реакция — гарантируется конструкцией perturbation).
# ============================================================================

coefficients:

  p_and_a:
    value: 0.25
    rationale: >
      [v1.3.5 Tier C, medium confidence]
      Триангуляция по АКАР 2024 (структура рынка рекламы РФ 904 млрд ₽):
      Интернет 52% × pt 0.25 + Видео ТВ+OLV 31.5% × pt 0.10 + OOH 10.7% ×
      pt 0.35 + Аудио 2.7% × pt 0.05 + Издательский 3% × pt 0.15 = 0.205.
      Экспертная v1.3: 0.30. Расхождение 9.5 п.п. <15 п.п. → медиана 0.25.
      Интернет pt 0.25 учитывает, что VK Реклама/Яндекс Директ — рубли,
      но программатик/SSP и параллельный запуск TikTok/Meta имеют
      валютную компоненту ~20-30%. DOOH (56% OOH) на импортных LED-панелях.
      Источники: akarussia.ru, adpass.ru, outdoor.ru, adindex.ru, delprof.ru.
      См. fx_pass_through_calibration.md §3.

  cogs:
    value: 0.22
    rationale: >
      [v1.3.5 Tier C, medium confidence]
      Триангуляция по декомпозиции производственных затрат:
      Съёмочное оборуд. (аренда ARRI/RED) 15% × pt 0.85 + VFX/Post-services
      20% × pt 0.30 + Зарплаты группы 35% × pt 0.05 + Логистика 10% × pt 0.15
      + Реквизит/костюмы 10% × pt 0.20 + Прочее 10% × pt 0.05 = 0.246.
      Экспертная v1.3: 0.20. Расхождение 5 п.п. <15 п.п. → медиана 0.22.
      VFX-pt=0.30 отражает: рос. услуги — рубли, но импортные лицензии
      (Houdini, Maya, Nuke) формируют ~30% стоимости VFX через параллельный
      импорт. Источники: Syssoft.ru (цены лицензий), kino.rent/kinozavod.ru
      (аренда), Фонд кино (бюджеты картин). См. fx_pass_through_calibration.md §4.

  production_capex:
    value: 0.40
    rationale: >
      [v1.3.5 Tier C, LOW CONFIDENCE — требуется прямой опрос производственного блока]
      Триангуляция через декомпозицию капитальных покупок (отличается от
      COGS по природе — аренда/услуги vs. капитал):
      Камеры/оптика ARRI/RED 30% × pt 0.90 + Свет 20% × pt 0.50 +
      GPU/рендер-станции 20% × pt 0.90 + VFX софт лицензии 15% × pt 0.75 +
      Мебель/прочее 15% × pt 0.30 = 0.6975 ≈ 0.70.
      Экспертная v1.3: 0.20 (ошибочно приравнена к COGS). Расхождение 50 п.п.
      ≥15 п.п. → LOW CONFIDENCE флаг + консервативная медиана 0.40 (защитное
      значение между ошибочным экспертным 0.20 и расчётным 0.70).
      Для повышения до medium-high: прямой опрос закупок производственного
      блока. Источники: РБК 27.05.2023 (90%+ импорта камер), vc.ru/IT-World/
      rspectr (GPU через параллельный импорт ×2-3 к мировым ценам),
      Novy Svet / LEDsi (рос. производители света на ~50% рынка).
      См. fx_pass_through_calibration.md §5.

  infrastructure_capex:
    value: 0.74
    rationale: >
      [v1.3.1, medium-high confidence — без изменений в v1.3.5]
      Декомпозиция на 4 подстатьи с весами:
      [камеры 14% × 0.90; LED-walls 33% × 0.75; GPU/post 33% × 0.95;
      СМР 21% × 0.25] = 0.7395 ≈ 0.74. Основные источники: РБК 27.05.2023
      «Российские киностудии заявили о зависимости от импортных камер»
      (90%+ импорта на камерах); vc.ru/IT-World/rspectr (GPU через
      параллельный импорт, цены ×2–3); xLED/VDS-Pro/Горького VP (LED-walls
      ROE/INFiLED/Unilumin); Ведомости/РБК/Forbes/РГ (СМР: база 90-95%
      локализована, инженерные системы — импорт 30-50%). Старое значение
      0.50 было занижено на ~32%. Интервал устойчивости [0.65; 0.80].

  valuation:
    value: 0.20
    rationale: >
      [v1.3.5 Tier C, medium confidence]
      Триангуляция через чувствительность WACC/NPV к FX:
      Δfx +10% → ΔCRP +1-2 п.п. → ΔWACC +1 п.п. → ΔNPV ≈ -7% (при EV/EBITDA
      15x и горизонте 10 лет) → implied pass-through 0.70 на static basis.
      С учётом временного лага транзмиссии (6-12 месяцев) и разложения эффекта
      на second-order → реалистичный 0.25-0.30. Расчётная медиана 0.25.
      Экспертная v1.3: 0.15. Расхождение 10 п.п. <15 п.п. → медиана 0.20.
      Источники CRP Russia 2024: Damodaran substack (11%), NYU Stern (ERP
      23.21% / CRP 18.21%), Forbes RU / Aston (10-12%), Smart-lab / РБК.
      См. fx_pass_through_calibration.md §6.

