  <style>
  /* === S26: DESIGN SYSTEM v2 =================================== */
  :root {
    --bg-primary:     #0A0E1A;
    --bg-secondary:   #141A2A;
    --bg-tertiary:    #1E2640;
    --bg-glass:       rgba(20,26,42,0.65);

    --gold:           #C9A961;
    --gold-light:     #E5C98A;
    --gold-dark:      #8B7538;
    --gold-glow:      rgba(201,169,97,0.45);

    --text-primary:   #F5F5F5;
    --text-secondary: #9CA3AF;
    --text-muted:     #6B7280;

    --success: #10B981;
    --warning: #F59E0B;
    --danger:  #EF4444;
    --info:    #60A5FA;

    --grad-cinema: linear-gradient(135deg, #0A0E1A 0%, #141A2A 50%, #1E2640 100%);
    --grad-gold:   linear-gradient(135deg, #8B7538 0%, #C9A961 50%, #E5C98A 100%);
    --grad-risk:   linear-gradient(90deg, #10B981 0%, #F59E0B 50%, #EF4444 100%);

    --shadow-sm:   0 2px 8px rgba(0,0,0,0.30);
    --shadow-md:   0 8px 24px rgba(0,0,0,0.45);
    --shadow-lg:   0 20px 60px rgba(0,0,0,0.60);
    --shadow-gold: 0 0 40px rgba(201,169,97,0.35);

    --border-subtle: 1px solid rgba(255,255,255,0.06);
    --border-gold:   1px solid rgba(201,169,97,0.25);

    --r-sm:  6px;  --r-md: 12px;  --r-lg: 20px;  --r-xl: 32px;

    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out-q: cubic-bezier(0.76, 0, 0.24, 1);
    --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);

    --t-fast: 160ms;  --t-base: 320ms;  --t-slow: 720ms;  --t-epic: 1600ms;

    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --font-display: 'Georgia', serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  [data-theme="light"] {
    --bg-primary:     #F8F7F2;
    --bg-secondary:   #FFFFFF;
    --bg-tertiary:    #EEECE4;
    --bg-glass:       rgba(255,255,255,0.7);
    --text-primary:   #111827;
    --text-secondary: #4B5563;
    --text-muted:     #9CA3AF;
    --border-subtle:  1px solid rgba(0,0,0,0.08);
    --shadow-md:      0 8px 24px rgba(15,15,15,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

  body { opacity: 0; transition: opacity var(--t-slow) var(--ease-out-expo); }
  body.fonts-loaded { opacity: 1; }

  #app-root { position: relative; width: 100vw; height: 100vh; }

  /* Progress bar (S27) */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    box-shadow: var(--shadow-gold);
    transition: width var(--t-base) var(--ease-out-expo);
    z-index: 100;
  }

  /* Deck container */
  #deck { position: relative; width: 100%; height: 100%; }

  /* Slide base (16:9) */
  .slide {
    position: absolute; top: 50%; left: 50%;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    transform: translate(-50%, -50%);
    background: var(--bg-primary);
    opacity: 0; pointer-events: none;
    transition: opacity var(--t-base) var(--ease-in-out-q);
    overflow: hidden;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* Gold accent line top of each slide */
  .slide::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0); transform-origin: center;
    transition: transform var(--t-slow) var(--ease-out-expo) 0.15s;
  }
  .slide.active::before { transform: scaleX(1); }

  /* Safe area */
  .slide-inner {
    position: absolute; top: 8%; right: 6%; bottom: 8%; left: 6%;
    display: flex; flex-direction: column;
  }

  /* Utilities */
  .glass {
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: var(--border-subtle);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-md);
  }

  .shimmer {
    background: linear-gradient(90deg, var(--gold-dark) 0%, var(--gold-light) 50%, var(--gold-dark) 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .gold-text { background: var(--grad-gold); -webkit-background-clip: text; background-clip: text; color: transparent; }

  h1, .h1 { font-family: var(--font-display); font-size: clamp(36px, 4vw, 64px); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; }
  h2, .h2 { font-family: var(--font-display); font-size: clamp(24px, 2.4vw, 32px); font-weight: 400; line-height: 1.2; }
  .num-display { font-family: var(--font-display); font-size: clamp(60px, 8vw, 120px); font-weight: 400; line-height: 1; }

  /* Footer */
  #deck-footer {
    position: fixed; bottom: 16px; left: 6%; right: 6%;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-secondary); letter-spacing: 0.05em; text-transform: uppercase;
    z-index: 50; pointer-events: none;
  }

  /* Slide dots (S27) */
  #slide-dots {
    position: fixed; bottom: 40px; right: 6%;
    display: flex; gap: 8px; z-index: 60;
  }
  #slide-dots button {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted); border: none; cursor: pointer;
    transition: all var(--t-fast) var(--ease-out-expo);
  }
  #slide-dots button.active { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); transform: scale(1.4); }
  #slide-dots button:hover { background: var(--gold-light); transform: scale(1.2); }

  /* Overlay / modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; transition: opacity var(--t-base);
  }
  #overlay.active { display: flex; opacity: 1; }
  #overlay .overlay-body { max-width: 80vw; max-height: 80vh; overflow: auto; padding: 40px; }

  /* Cursor trail */
  #cursor-trail {
    position: fixed; width: 12px; height: 12px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 20px var(--gold-glow);
    pointer-events: none; z-index: 300;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  /* === /S26 DESIGN SYSTEM ====================================== */

  <script>
  (function() {
    'use strict';

    // Parse inline data
    window.TS = window.TS || {};
    try {
      window.TS.data = {
        deck: JSON.parse(document.getElementById('deck-content').textContent),
        viz:  JSON.parse(document.getElementById('viz-data').textContent),
      };
    } catch (e) {
      console.error('[S26] Failed to parse inline JSON:', e);
      window.TS.data = { deck: { slides: [] }, viz: {} };
    }
    window.TS.slide = (n) => window.TS.data.deck.slides[n - 1];
    window.TS.state = {};

    // Theme
    window.THEME = {
      current: 'dark',
      _listeners: [],
      toggle() { this.apply(this.current === 'dark' ? 'light' : 'dark'); },
      apply(name) {
        this.current = name;
        document.documentElement.setAttribute('data-theme', name);
        this._listeners.forEach(cb => cb(name));
      },
      on(_, cb) { this._listeners.push(cb); },
      off(_, cb) { this._listeners = this._listeners.filter(x => x !== cb); },
    };

    // Fonts
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => document.body.classList.add('fonts-loaded'));
    } else {
      document.body.classList.add('fonts-loaded');
    }
  })();
  </script>

  <!-- === S26: FINAL BOOT ======================================== -->
  <script>
  window.addEventListener('DOMContentLoaded', () => {
    // Wait a tick to allow S27..S29 + S01..S25 to register.
    setTimeout(() => {
      if (window.NAV && typeof window.NAV.goto === 'function') {
        const hash = window.location.hash.match(/#slide-(\d+)/);
        const n = hash ? Math.max(1, Math.min(25, parseInt(hash[1], 10))) : 1;
        window.NAV.goto(n, { animate: false });
      } else {
        // Fallback: activate slide 1
        const first = document.getElementById('slide-01');
        if (first) first.classList.add('active');
      }
    }, 50);
  });
