<!-- Layout: metrics — top header + grid of metric cards -->
<div class="slide-inner">
  <h2 class="slide-title" data-bind="title"></h2>
  <p class="slide-subtitle" data-bind="subtitle"></p>
  <div class="grid-4" data-bind="metrics" style="margin-bottom:24px;"></div>
  <div class="slide-content" data-bind="content" style="flex:1; min-height:0;"></div>
  <div class="disclosure" data-bind="disclosure"></div>
</div>
