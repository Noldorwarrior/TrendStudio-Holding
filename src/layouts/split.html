<!-- Layout: split — two columns (text left, chart/visual right) -->
<div class="slide-inner">
  <h2 class="slide-title" data-bind="title"></h2>
  <p class="slide-subtitle" data-bind="subtitle"></p>
  <div class="grid-2" style="flex:1; min-height:0;">
    <div class="slide-col-left" data-bind="left"></div>
    <div class="slide-col-right" data-bind="right"></div>
  </div>
</div>
